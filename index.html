  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>OnlineMarket365 | Pro Suite</title>

  <!-- Premium Fonts: Outfit (Headings) & Plus Jakarta Sans (Body) -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="manifest" href="/manifest.json">
  <style>
    :root {
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: #020617; /* Slate 950 */
      color: #f8fafc;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    h1, h2, h3, h4, h5, h6, .font-heading {
      font-family: var(--font-heading);
    }

    /* Cinematic Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseSlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    .animate-fade-in-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-scale-in { animation: scaleIn 0.4s ease-out forwards; }
    .animate-pulse-slow { animation: pulseSlow 4s infinite ease-in-out; }
    
    /* Universe Animations */
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes twinkling {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.1); }
      100% { opacity: 0.3; transform: scale(1); }
    }

    .animate-spin-slow {
      animation: spinSlow 120s linear infinite;
    }

    .stars-overlay {
      background-image: 
        radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 50px 160px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 90px 40px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 130px 80px, #fff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: twinkling 5s infinite;
    }

    /* Scroll Zoom Reveal Animation - Bottom to Top Zoom */
    .reveal-zoom {
      opacity: 0;
      transform: scale(0.9) translateY(60px); /* Starts smaller and lower */
      transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), 
                  transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform, opacity;
    }
    
    .reveal-zoom.active {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Glass Utilities & Effects */
    .glass-panel {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    .glass-panel:hover {
      background: rgba(30, 41, 59, 0.6);
      border-color: rgba(129, 140, 248, 0.5);
      box-shadow: 0 10px 40px -10px rgba(129, 140, 248, 0.4), inset 0 0 20px rgba(129, 140, 248, 0.1);
      transform: translateY(-5px);
      z-index: 20;
    }

    /* Glass Refraction Effect */
    .glass-panel::after {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-20deg);
      animation: glassShine 6s infinite;
      pointer-events: none;
    }
    @keyframes glassShine {
      0% { left: -150%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    /* Continuous Floating Animation */
    @keyframes floatZeroGravity {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-float {
      animation: floatZeroGravity 6s ease-in-out infinite;
    }
    /* Stagger floating animations */
    .animate-float:nth-child(2n) { animation-delay: 1s; }
    .animate-float:nth-child(3n) { animation-delay: 2s; }
    .animate-float:nth-child(4n) { animation-delay: 3s; }

    /* Zoom Overlay */
    .zoom-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .zoom-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Zoomed Panel State */
    .glass-panel.zoomed {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) scale(1.5) !important;
      z-index: 101 !important;
      transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1) !important;
      animation: none !important;
      box-shadow: 0 0 100px rgba(129, 140, 248, 0.5) !important;
    }

    /* Magnetic Icon */
    .magnetic-icon {
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      display: inline-block;
    }

    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    /* Text Gradients */
    .text-gradient {
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Neon Icon Glow Effect */
    .neon-icon {
      background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 40%, #f97316 80%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.6)) drop-shadow(0 0 16px rgba(249, 115, 22, 0.4));
      display: inline-block;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .group:hover .neon-icon, .neon-icon:hover {
      filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.9)) drop-shadow(0 0 24px rgba(249, 115, 22, 0.7)) brightness(1.2);
    }

    /* --- TURBO MODE (High Performance) --- */
    body.turbo-mode .reveal-zoom {
      transition: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
    body.turbo-mode * {
      backdrop-filter: none !important; /* Removes heavy glass effect */
      box-shadow: none !important; /* Reduces GPU usage */
      text-shadow: none !important;
    }
    body.turbo-mode .animate-spin-slow,
    body.turbo-mode .animate-pulse-slow,
    body.turbo-mode .stars-overlay {
      animation: none !important;
    }
  </style>
<script type="importmap">
{
  "imports": {

<script>
  // Service Worker Registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/serviceWorker.js')
        .then(req => console.log('SW Registered'))
        .catch(err => console.log('SW Failed', err));
    });
  }

  // Scroll Reveal Observer (Bidirectional)
  document.addEventListener('DOMContentLoaded', () => {
    // Check for Turbo Mode preference, default to true for smoother performance
    const savedTurbo = localStorage.getItem('market365_turbo');
    const isTurbo = savedTurbo === null ? true : savedTurbo === 'true';
    if(isTurbo) document.body.classList.add('turbo-mode');

    const observerOptions = {
      root: null, // viewport
      rootMargin: '0px',
      threshold: 0.1 // Trigger when 10% visible
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
        } else {
          // Removes active class when out of view to allow re-animating on scroll up/down
          // This creates the "niche se upar ko zoom" effect repeatedly
          entry.target.classList.remove('active');
        }
      });
    }, observerOptions);

    // Observe function to be called periodically or on mutation
    const observeNewElements = () => {
      if (document.body.classList.contains('turbo-mode')) {
         document.querySelectorAll('.reveal-zoom').forEach(el => el.classList.add('active'));
         return;
      }
      document.querySelectorAll('.reveal-zoom').forEach(el => {
        observer.observe(el);
      });
    };

    // Initial Observe
    observeNewElements();

    // Re-observe on DOM changes (important for React single page app)
    const mutationObserver = new MutationObserver(observeNewElements);
    mutationObserver.observe(document.body, { childList: true, subtree: true });
  });
</script>
